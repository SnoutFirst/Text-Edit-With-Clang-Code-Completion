name: Build WASM and Deploy to GitHub Pages

on:
  pull_request:
  release:
    types: [published]
  push:
    branches: [main, develop, debug/wasm-tmate]
    tags: ['**']

permissions:
  contents: write

env:
  VERBOSE: 1

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v16
        with:
          version: '3.1.50'

      - name: Install Ninja
        run: sudo apt-get install -y ninja-build

      # Qt6 WASM needs host tools (moc/rcc/uic) from a desktop Qt install.
      - name: Install Qt6 host tools (desktop)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          arch: 'linux_gcc_64'
          install-deps: true
          dir: ${{ runner.temp }}/qt-host

      - name: Install Qt6 for WASM
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          host: 'all_os'
          target: 'wasm'
          arch: 'wasm_singlethread'
          install-deps: true

      - name: Download prebuilt Emscripten libclang
        run: |
          mkdir -p ${{ runner.temp }}/libclang-wasm
          cd ${{ runner.temp }}/libclang-wasm
          curl -fsSL -o llvm-build.tar.gz https://github.com/TheComputerM/libclang-wasm/releases/download/v0/llvm-build.tar.gz
          tar -xzf llvm-build.tar.gz
          echo "EMSCRIPTEN_LIBCLANG_ROOT=${{ runner.temp }}/libclang-wasm" >> $GITHUB_ENV

      - name: Dump ABI diagnostics for libclang + Qt
        run: |
          set -euo pipefail
          OUT="${{ runner.temp }}/wasm-abi-diag"
          mkdir -p "$OUT"
          {
            echo "=== Emscripten version ==="
            em++ --version 2>&1 || true
            echo ""
            echo "=== llvm-nm availability ==="
            which llvm-nm || true
            which emnm || true
            ls -la "${EMSDK}/upstream/bin/llvm-nm" || true
            echo ""
            echo "=== libclang archive undefined (U) symbols referencing exception / longjmp runtime ==="
            for f in $(find "${{ runner.temp }}/libclang-wasm/lib" -name '*.a'); do
              echo ""
              echo "--- $f ---"
              "${EMSDK}/upstream/bin/llvm-nm" "$f" 2>/dev/null | grep -E '^[[:space:]]*U[[:space:]]+(__cxa_(begin|end|throw|rethrow|find_matching_catch)|__wasm_setjmp|emscripten_longjmp|llvm_eh_typeid_for|__resumeException)' || true
            done
            echo ""
            echo "=== Qt archive undefined (U) symbols referencing exception / longjmp runtime ==="
            for f in $(find "$QT_ROOT_DIR/lib" "$QT_ROOT_DIR/plugins" -name '*.a' 2>/dev/null); do
              echo ""
              echo "--- $f ---"
              "${EMSDK}/upstream/bin/llvm-nm" "$f" 2>/dev/null | grep -E '^[[:space:]]*U[[:space:]]+(__cxa_(begin|end|throw|rethrow|find_matching_catch)|__wasm_setjmp|emscripten_longjmp|llvm_eh_typeid_for|__resumeException)' || true
            done
            echo ""
            echo "=== libclang.a first 50 symbols ==="
            for f in $(find "${{ runner.temp }}/libclang-wasm" -name 'libclang.a'); do
              echo ""
              echo "--- $f ---"
              "${EMSDK}/upstream/bin/llvm-nm" "$f" 2>/dev/null | head -50 || true
            done
            echo ""
            echo "=== libclang.a all undefined symbols ==="
            for f in $(find "${{ runner.temp }}/libclang-wasm" -name 'libclang.a'); do
              echo ""
              echo "--- $f ---"
              "${EMSDK}/upstream/bin/llvm-nm" "$f" 2>/dev/null | grep '^[[:space:]]*U' || true
            done
          } > "$OUT/abi-diag.txt"
          ls -la "$OUT"
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-abi-diagnostics
          path: ${{ runner.temp }}/wasm-abi-diag
          if-no-files-found: error

      - name: Configure CMake
        env:
          QT_HOST_PATH: ${{ runner.temp }}/qt-host/Qt/6.7.3/gcc_64
        run: emcmake cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH:PATH="$QT_ROOT_DIR" -DQT_HOST_PATH:PATH="$QT_HOST_PATH" -DCMAKE_FIND_ROOT_PATH_MODE_PACKAGE=BOTH -DTextEditWithClangCodeCompletion_ENABLE_IPO=OFF -DTextEditWithClangCodeCompletion_ENABLE_CLANG_TIDY=OFF -DTextEditWithClangCodeCompletion_ENABLE_CPPCHECK=OFF -DTextEditWithClangCodeCompletion_WARNINGS_AS_ERRORS=OFF -DTextEditWithClangCodeCompletion_ENABLE_SANITIZER_ADDRESS=OFF -DTextEditWithClangCodeCompletion_ENABLE_SANITIZER_UNDEFINED=OFF -DTextEditWithClangCodeCompletion_ENABLE_SANITIZER_LEAK=OFF -DTextEditWithClangCodeCompletion_ENABLE_SANITIZER_THREAD=OFF

      - name: Build all WASM targets
        id: wasm-build
        continue-on-error: true
        run: emmake cmake --build build --target web-dist

      - name: Upload build logs on failure
        if: steps.wasm-build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: wasm-build-logs
          path: build/**/*.log
          if-no-files-found: ignore

      - name: Try manual link diagnostics on failure
        if: steps.wasm-build.outcome == 'failure'
        run: |
          set -euo pipefail
          echo "=== Manual link attempt with ERROR_ON_UNDEFINED_SYMBOLS=0 ==="
          # Re-run ninja and capture the failing link command, then append the override.
          # This is a heuristic; the real link command is visible in VERBOSE output.
          emmake cmake --build build --target texteditwithclangcodecompletion -v 2>&1 | tee /tmp/manual-link.log || true
          tail -80 /tmp/manual-link.log

      - name: Prepare deployment
        run: |
          rm -rf dist
          cp -r build/web-dist dist

      - name: Determine deploy path
        id: deploy-path
        if: github.event_name != 'pull_request' && github.event_name != 'release'
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "path=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/heads/main ]]; then
            echo "path=." >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/heads/develop ]]; then
            echo "path=develop" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request' && github.event_name != 'release'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: ${{ steps.deploy-path.outputs.path }}
          keep_files: true
