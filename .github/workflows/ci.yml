name: ci
on:
  pull_request:
  release:
    types: [published]
  push:
    tags:
    branches:
      - main
      - develop

env:
  CLANG_TIDY_VERSION: "19.1.1"
  VERBOSE: 1

jobs:
  Test:
    name: ${{matrix.os}} ${{matrix.compiler}} ${{matrix.build_type}} ${{matrix.packaging_maintainer_mode == 'ON' && '(maintainer mode)' || ''}}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false

      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        compiler:
          - llvm-19.1.1
          - gcc-14
        generator:
          - "Ninja Multi-Config"
        build_type:
          - Release
          - Debug
        packaging_maintainer_mode:
          - ON
          - OFF
        build_shared:
          - OFF

        exclude:
          - os: windows-latest
            compiler: gcc-14

        include:
          - compiler: gcc-14
            gcov_executable: gcov-14
            enable_ipo: On
            qt_arch: linux_gcc_64

          - compiler: llvm-19.1.1
            enable_ipo: Off
            gcov_executable: "llvm-cov gcov"
            qt_arch: linux_gcc_64

          - os: macos-latest
            enable_ipo: Off
            qt_arch: clang_64

          - build_type: Release
            packaging_maintainer_mode: On
            package_generator: TBZ2

          - os: ubuntu-latest
            compiler: gcc-14
            generator: "Unix Makefiles"
            build_type: Debug
            gcov_executable: gcov-14
            packaging_maintainer_mode: On
            enable_ipo: Off
            qt_arch: linux_gcc_64

          - os: windows-latest
            compiler: msvc
            generator: "Visual Studio 17 2022"
            build_type: Debug
            packaging_maintainer_mode: On
            enable_ipo: On
            qt_arch: win64_msvc2019_64

          - os: windows-latest
            compiler: msvc
            generator: "Visual Studio 17 2022"
            build_type: Release
            packaging_maintainer_mode: On
            enable_ipo: On
            qt_arch: win64_msvc2019_64

          - os: windows-latest
            compiler: msvc
            generator: "Visual Studio 17 2022"
            build_type: Debug
            packaging_maintainer_mode: Off
            qt_arch: win64_msvc2019_64

          - os: windows-latest
            compiler: msvc
            generator: "Visual Studio 17 2022"
            build_type: Release
            packaging_maintainer_mode: Off
            enable_ipo: On
            qt_arch: win64_msvc2019_64
            package_generator: ZIP

          - os: windows-latest
            compiler: msvc
            generator: "Visual Studio 17 2022"
            build_type: Release
            packaging_maintainer_mode: On
            enable_ipo: On
            build_shared: On
            qt_arch: win64_msvc2019_64

    steps:
      - name: Check for llvm version mismatches
        if: ${{ contains(matrix.compiler, 'llvm') && !contains(matrix.compiler, env.CLANG_TIDY_VERSION) }}
        uses: actions/github-script@v9
        with:
          script: |
            core.setFailed('There is a mismatch between configured llvm compiler and clang-tidy version chosen')

      - uses: actions/checkout@v6

      - name: Setup Cache
        uses: ./.github/actions/setup_cache
        with:
          compiler: ${{ matrix.compiler }}
          build_type: ${{ matrix.build_type }}
          packaging_maintainer_mode: ${{ matrix.packaging_maintainer_mode }}
          generator: ${{ matrix.generator }}

      - name: Project Name
        uses: cardinalby/export-env-action@v2
        with:
          envFile: '.github/constants.env'

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          arch: ${{ matrix.qt_arch }}
          install-deps: true

      - name: Install LLVM/libclang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: '19.1.0'

      - name: Setup Cpp
        uses: aminya/setup-cpp@v1
        with:
          compiler: ${{ matrix.compiler }}
          vcvarsall: ${{ contains(matrix.os, 'windows' )}}
          cmake: true
          ninja: true
          vcpkg: false
          ccache: true
          clangtidy: ${{ env.CLANG_TIDY_VERSION }}
          cppcheck: true
          gcovr: true
          opencppcoverage: true

      - name: Configure CMake
        shell: bash
        run: |
          cmake -S . -B ./build -G "${{matrix.generator}}" \
            -D CMAKE_PREFIX_PATH:PATH="$QT_ROOT_DIR" \
            -D ${{ env.PROJECT_NAME }}_ENABLE_IPO=${{matrix.enable_ipo }} \
            -D CMAKE_BUILD_TYPE:STRING=${{matrix.build_type}} \
            -D ${{ env.PROJECT_NAME }}_PACKAGING_MAINTAINER_MODE:BOOL=${{matrix.packaging_maintainer_mode}} \
            -D ${{ env.PROJECT_NAME }}_ENABLE_CLANG_TIDY:BOOL=OFF \
            -D ${{ env.PROJECT_NAME }}_ENABLE_CPPCHECK:BOOL=OFF \
            -D ${{ env.PROJECT_NAME }}_ENABLE_COVERAGE:BOOL=OFF \
            -D ${{ env.PROJECT_NAME }}_WARNINGS_AS_ERRORS:BOOL=OFF \
            -DGIT_SHA:STRING=${{ github.sha }}

      - name: Build
        run: |
          cmake --build ./build --config ${{matrix.build_type}}

      - name: Unix - Test and coverage
        if: runner.os != 'Windows'
        working-directory: ./build
        run: |
          ctest -C ${{matrix.build_type}}

      - name: Windows - Test and coverage
        if: runner.os == 'Windows'
        working-directory: ./build
        run: |
          ctest -C ${{matrix.build_type}}

      - name: CPack
        if: matrix.package_generator != ''
        working-directory: ./build
        run: |
          cpack -C ${{matrix.build_type}} -G ${{matrix.package_generator}}

      - name: Publish Tagged Release
        uses: softprops/action-gh-release@v3
        if: ${{ startsWith(github.ref, 'refs/tags/') && matrix.package_generator != '' }}
        with:
          files: |
            build/*-*${{ matrix.build_type }}*-*.*

      - name: Publish to codecov
        uses: codecov/codecov-action@v5
        if: false
        with:
          fail_ci_if_error: false
          flags: ${{ runner.os }}
          name: ${{ runner.os }}-coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./build/coverage.xml
